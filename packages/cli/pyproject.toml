[project]
name = "agentreview"
version = "0.1.8"
description = "Generate LLM-friendly code review payloads from git or hg diffs"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
]

[project.scripts]
agentreview = "agentreview.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
